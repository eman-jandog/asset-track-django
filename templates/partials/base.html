{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js" integrity="sha384-ZBXiYtYQ6hJ2Y0ZNoYuI+Nq5MqWBr+chMrS/RkXpNzQCApHEhOt2aY8EJgqwHLkJ" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <style type="text/tailwindcss">
        @theme {
            --color-primary: #3B82F6;
            --color-secondary: #1E40AF;
            --color-bd-primary: #e5e7eb;
        }
        </style>
        <title>{% block title %} AssetTrack {% endblock %}</title>
    </head>
    <body class="bg-gray-50 font-sans">
        <!-- Dashboard Container -->
        <div id="dashboardContainer" class="min-h-screen bg-gray-50">
            {% include 'partials/sidebar.html' %}
            <div id="mainContent" class="min-h-screen flex flex-col transition-all duration-300 lg:ml-64">
                {% include 'partials/header.html' %}
                <main id="mainSection" class="p-6 flex-1">
                    {% block main %}{% endblock %}
                </main>
                {% include 'partials/footer.html' %}
            </div>
        </div>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden hidden"></div>

        <!-- All Modals -->
        {% block modals %}{% endblock %}    
    </body>
    <script src="{% static 'js/global.js' %}"></script>
</html>
